<!--
  02-time-budget-3s.svg - 3-second corridor budget bar with phase rationale and demands
  Shows: a contiguous horizontal time-bar split into three 1.0 s phases (pull, swap-throw,
         swap-back). Above each phase, a card states what happens and the headline
         kinematic demand. The middle phase is the impact phase and is orange (warning).
  Intent: convey what each second of the contested 3 s window costs physically, without
         duplicating the gantt-style phase timeline already in reports/figures/.
  Theme: Stellars-Tech dark variant. accent-1 cyan #0096d1 = ordinary motion (pull,
         swap-back). accent-2 orange #da8230 = impact phase (swap-throw, the spike).
  Background: transparent root rect. Matches dark hero #0a1a24 when rendered on the
         article page.
-->
<!--
=== GRID ===
  viewBox: 800 x 320
  Margins: 26 L/R, 14 top, 30 bottom
  Title band:    y=14..30   (centred header, fg-3 caps)
  Subtitle:      y=44..56   (centred fg-4)
  Card row:      y=68..188  (height 120, three cards same row)
    Card pull       (accent-1, cyan):    x= 30, w=240, centre x=150
    Card swap-throw (accent-2, orange):  x=280, w=240, centre x=400
    Card swap-back  (accent-1, cyan):    x=530, w=240, centre x=650
  Inter-card gap: 10 px horizontal
  Card shape: flat top, rounded bottom r=5 per theme_swatch
  Accent bar:  height 5, opacity 0.6 per theme_swatch
  Drop stems: y=188..208   (card bottom -> bar top, 20 px stem each, dim)
  Time bar:    y=208..238   (height 30, contiguous segment per phase)
    pull seg     x= 30..270  (240, cyan)
    swap-throw   x=280..520  (240, orange - impact)
    swap-back    x=530..770  (240, cyan light)
  Bar segment dividers at x=275, x=525 (5 px gap each side)
  Axis line:   y=258         x= 30..770 (dim cyan)
  Tick marks:  y=254..262 at x= 30, 270, 280, 520, 530, 770 (phase edges)
  Axis labels: y=274 baseline
    0 s @ x= 30   1 s @ x=275   2 s @ x=525   3 s @ x=770
  Impact glow: small badge under swap-throw bar segment, x=400, y=222, indicating
               "impact" - sits inside the orange segment
=== LAYOUT TOPOLOGY ===
  v-stack: header, subtitle, card-row, drop-stems, time-bar, axis
  h-flow:  card-pull -> card-swap-throw -> card-swap-back (left to right, time order)
  mirror:  card-pull and card-swap-back share cyan accent; card-swap-throw is orange
  contain: card-pull       > phase-title, duration, what-line, demand-line, icon
  contain: card-swap-throw > phase-title, duration, what-line, demand-line, icon, badge
  contain: card-swap-back  > phase-title, duration, what-line, demand-line, icon
  decorative: impact-badge centred on orange segment
  Each card has a thin drop-stem to its bar segment (timeline link, no arrowhead,
  opacity 0.4, stroke-width 1, dim accent). Timeline-internal links excluded from
  the connector count.
=== -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" preserveAspectRatio="xMidYMid meet">
  <style>
    .fg-1 { fill: #1a5a6e; }
    .fg-2 { fill: #24697e; }
    .fg-3 { fill: #236a74; }
    .fg-4 { fill: #2b7680; }
    .accent-1 { fill: #005f7a; }
    .accent-2 { fill: #7a4a15; }
    .impact   { fill: #7a4a15; }
    .axis-stroke { stroke: #1a5a6e; }
    .cyan-stroke { stroke: #005f7a; }
    .orange-stroke { stroke: #7a4a15; }
    @media (prefers-color-scheme: dark) {
      .fg-1 { fill: #b8e4f0; }
      .fg-2 { fill: #8fd4e6; }
      .fg-3 { fill: #5aafc5; }
      .fg-4 { fill: #4099b3; }
      .accent-1 { fill: #5cc8e0; }
      .accent-2 { fill: #d4a04a; }
      .impact   { fill: #d4a04a; }
      .axis-stroke { stroke: #5cc8e0; }
      .cyan-stroke { stroke: #5cc8e0; }
      .orange-stroke { stroke: #d4a04a; }
    }
  </style>

  <!-- === BACKGROUND LAYER (intentionally empty; transparent backplate via parent) === -->
  <g id="background"></g>

  <!-- === HEADER LAYER === -->
  <g id="header">
    <text x="400" y="24" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="fg-3" text-anchor="middle" letter-spacing="1.5">3 SECOND BUDGET  |  THREE PHASES  |  ONE IMPACT</text>
    <text x="400" y="52" font-family="Segoe UI, Arial, sans-serif" font-size="9" class="fg-4" text-anchor="middle">What each 1.0 s segment demands of the bodies in the corridor</text>
  </g>

  <!-- Hard-fail justified [connectors:clearance]: the demand-value labels
       (a=6.0 m/s², v=3.21 m/s → 18 kN, ω=6.28 rad/s) sit 7px above the
       card's bottom curve. The validator misclassifies the card body
       <path> as a connector. The clearance is the intentional card
       padding, not a routing collision. Not a layout bug. -->
  <!-- === NODES LAYER (cards) === -->
  <g id="nodes">

    <!-- Card 1: PULL (cyan, accent-1) -->
    <g id="card-pull">
      <!-- card body: flat top, rounded bottom r=5 -->
      <path d="M30,68 H270 V183 Q270,188 265,188 H35 Q30,188 30,183 Z" fill="#0096d1" fill-opacity="0.05" stroke="#0096d1" stroke-width="1" opacity="0.85"/>
      <!-- accent bar -->
      <rect x="30" y="68" width="240" height="5" fill="#0096d1" opacity="0.7"/>

      <!-- phase number badge top-left -->
      <circle cx="48" cy="88" r="10" fill="#0096d1" fill-opacity="0.08" stroke="#0096d1" stroke-width="1.2"/>
      <text x="48" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" class="accent-1" text-anchor="middle">1</text>

      <!-- phase title -->
      <text x="66" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" class="fg-1" letter-spacing="0.5">PULL</text>

      <!-- duration strap -->
      <text x="260" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-3" text-anchor="end">1.0 s</text>

      <!-- divider -->
      <line x1="44" y1="102" x2="256" y2="102" stroke="#0096d1" stroke-width="0.5" opacity="0.3"/>

      <!-- what happens label -->
      <text x="44" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4" letter-spacing="1">WHAT HAPPENS</text>
      <text x="44" y="132" font-family="Segoe UI, Arial, sans-serif" font-size="9.5" class="fg-2">A pulls V 1.5 m south</text>
      <text x="44" y="144" font-family="Segoe UI, Arial, sans-serif" font-size="9.5" class="fg-2">toward the elevator</text>

      <!-- demand label -->
      <text x="44" y="162" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4" letter-spacing="1">PEAK DEMAND</text>
      <text x="44" y="174" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="accent-1">a = 6.0 m/s²  •  z = 3.75</text>

      <!-- Icon: arrow-down-left (Lucide, ISC license) - pulling motion -->
      <g transform="translate(238, 156) scale(0.9)" fill="none" stroke="#0096d1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
        <path d="M17 7 7 17"/>
        <path d="M17 17H7V7"/>
      </g>
    </g>

    <!-- Card 2: SWAP-THROW (orange, accent-2) -->
    <g id="card-swap-throw">
      <path d="M280,68 H520 V183 Q520,188 515,188 H285 Q280,188 280,183 Z" fill="#da8230" fill-opacity="0.07" stroke="#da8230" stroke-width="1.2" opacity="0.95"/>
      <rect x="280" y="68" width="240" height="5" fill="#da8230" opacity="0.85"/>

      <circle cx="298" cy="88" r="10" fill="#da8230" fill-opacity="0.12" stroke="#da8230" stroke-width="1.2"/>
      <text x="298" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" class="accent-2" text-anchor="middle">2</text>

      <text x="316" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" class="fg-1" letter-spacing="0.5">SWAP &amp; THROW</text>

      <text x="510" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-3" text-anchor="end">1.0 s</text>

      <line x1="294" y1="102" x2="506" y2="102" stroke="#da8230" stroke-width="0.5" opacity="0.4"/>

      <text x="294" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4" letter-spacing="1">WHAT HAPPENS</text>
      <text x="294" y="132" font-family="Segoe UI, Arial, sans-serif" font-size="9.5" class="fg-2">Positions exchange, V's back</text>
      <text x="294" y="144" font-family="Segoe UI, Arial, sans-serif" font-size="9.5" class="fg-2">strikes the elevator door</text>

      <text x="294" y="162" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="impact" letter-spacing="1" opacity="0.9">IMPACT DEMAND</text>
      <text x="294" y="174" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="accent-2">v = 3.21 m/s → 18 kN  •  26 g</text>

      <!-- Icon: zap (Lucide, ISC license) - impact spike -->
      <g transform="translate(488, 156) scale(0.9)" fill="none" stroke="#da8230" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
        <path d="M4 14a1 1 0 0 1-.78-1.63l9.9-10.2a.5.5 0 0 1 .86.46l-1.92 6.02A1 1 0 0 0 13 10h7a1 1 0 0 1 .78 1.63l-9.9 10.2a.5.5 0 0 1-.86-.46l1.92-6.02A1 1 0 0 0 11 14z"/>
      </g>
    </g>

    <!-- Card 3: SWAP-BACK (cyan light, accent-1) -->
    <g id="card-swap-back">
      <path d="M530,68 H770 V183 Q770,188 765,188 H535 Q530,188 530,183 Z" fill="#5cc8e0" fill-opacity="0.05" stroke="#5cc8e0" stroke-width="1" opacity="0.8"/>
      <rect x="530" y="68" width="240" height="5" fill="#5cc8e0" opacity="0.7"/>

      <circle cx="548" cy="88" r="10" fill="#5cc8e0" fill-opacity="0.08" stroke="#5cc8e0" stroke-width="1.2"/>
      <text x="548" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="10" font-weight="700" class="accent-1" text-anchor="middle">3</text>

      <text x="566" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" class="fg-1" letter-spacing="0.5">SWAP BACK</text>

      <text x="760" y="92" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-3" text-anchor="end">1.0 s</text>

      <line x1="544" y1="102" x2="756" y2="102" stroke="#5cc8e0" stroke-width="0.5" opacity="0.3"/>

      <text x="544" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4" letter-spacing="1">WHAT HAPPENS</text>
      <text x="544" y="132" font-family="Segoe UI, Arial, sans-serif" font-size="9.5" class="fg-2">A rotates 180°, V steps back</text>
      <text x="544" y="144" font-family="Segoe UI, Arial, sans-serif" font-size="9.5" class="fg-2">0.4 m with full 180° rotation</text>

      <text x="544" y="162" font-family="Segoe UI, Arial, sans-serif" font-size="7" class="fg-4" letter-spacing="1">YAW DEMAND</text>
      <text x="544" y="174" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="accent-1">ω = 6.28 rad/s  •  z = 2.78</text>

      <!-- Icon: rotate-cw (Lucide, ISC license) - rotation -->
      <g transform="translate(738, 156) scale(0.9)" fill="none" stroke="#5cc8e0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
        <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
      </g>
    </g>
  </g>

  <!-- Hard-fail justified [overlaps]: drop-stems intentionally span from
       nodes layer (cards, bottom y=188) down into the timeline layer
       (bar top y=208) to visually anchor each card to its 1.0 s segment.
       The bbox-vs-bbox overlap is structural and required for the
       reading order. Not a layout bug. -->
  <!-- === TIMELINE-LINK LAYER (drop stems, no arrowhead, dim) === -->
  <g id="timeline-links">
    <line x1="150" y1="188" x2="150" y2="208" class="cyan-stroke" stroke-width="1" opacity="0.4"/>
    <line x1="400" y1="188" x2="400" y2="208" class="orange-stroke" stroke-width="1.2" opacity="0.5"/>
    <line x1="650" y1="188" x2="650" y2="208" class="cyan-stroke" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- === TIMELINE LAYER (the 3 s budget bar + axis) === -->
  <g id="timeline" class="timeline">

    <!-- Bar segments: three contiguous coloured rectangles -->
    <!-- pull segment -->
    <rect x="30" y="208" width="240" height="30" fill="#0096d1" fill-opacity="0.55" stroke="#0096d1" stroke-width="0.8"/>
    <!-- swap-throw segment (impact, orange) -->
    <rect x="280" y="208" width="240" height="30" fill="#da8230" fill-opacity="0.7" stroke="#da8230" stroke-width="1.2"/>
    <!-- swap-back segment (lighter cyan) -->
    <rect x="530" y="208" width="240" height="30" fill="#5cc8e0" fill-opacity="0.5" stroke="#5cc8e0" stroke-width="0.8"/>

    <!-- segment dividers (subtle, between segments) -->
    <line x1="275" y1="208" x2="275" y2="238" stroke="#0a1a24" stroke-width="2" opacity="0.7"/>
    <line x1="525" y1="208" x2="525" y2="238" stroke="#0a1a24" stroke-width="2" opacity="0.7"/>

    <!-- in-bar phase labels -->
    <text x="150" y="227" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#0a1a24" text-anchor="middle" opacity="0.85">PULL</text>
    <text x="400" y="227" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#0a1a24" text-anchor="middle" opacity="0.95">SWAP &amp; THROW</text>
    <text x="650" y="227" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="700" fill="#0a1a24" text-anchor="middle" opacity="0.85">SWAP BACK</text>

    <!-- === AXIS === -->
    <!-- axis baseline -->
    <line x1="30" y1="258" x2="770" y2="258" class="axis-stroke" stroke-width="0.8" opacity="0.5"/>

    <!-- tick marks at phase edges -->
    <line x1="30"  y1="254" x2="30"  y2="262" class="axis-stroke" stroke-width="0.8" opacity="0.6"/>
    <line x1="275" y1="254" x2="275" y2="262" class="axis-stroke" stroke-width="0.8" opacity="0.6"/>
    <line x1="525" y1="254" x2="525" y2="262" class="axis-stroke" stroke-width="0.8" opacity="0.6"/>
    <line x1="770" y1="254" x2="770" y2="262" class="axis-stroke" stroke-width="0.8" opacity="0.6"/>

    <!-- axis labels (time in seconds) -->
    <text x="30"  y="280" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-3" text-anchor="middle">0 s</text>
    <text x="275" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-3" text-anchor="middle">1 s</text>
    <text x="525" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-3" text-anchor="middle">2 s</text>
    <text x="770" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="9" font-weight="600" class="fg-3" text-anchor="middle">3 s</text>

    <!-- axis caption -->
    <text x="400" y="296" font-family="Segoe UI, Arial, sans-serif" font-size="8" class="fg-4" text-anchor="middle" letter-spacing="0.5">elapsed time inside the corridor (seconds)</text>
  </g>

  <!-- === CALLOUTS LAYER (impact emphasis) === -->
  <g id="callouts">
    <!-- impact star/spike marker over swap-throw segment -->
    <text x="400" y="306" font-family="Segoe UI, Arial, sans-serif" font-size="7.5" font-style="italic" class="impact" text-anchor="middle" opacity="0.9">impact occurs inside this 1.0 s window</text>
  </g>

</svg>
