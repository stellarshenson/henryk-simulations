      <path d="M20,240 H363 V307 Q363,310 360,310 H23 Q20,310 20,307 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
      <rect x="20" y="240" width="343" height="5" fill="#0096d1" opacity="0.7"/>
    </g>
    <g id="card-documented-3">
      <rect class="card" x="437" y="240" width="343" height="70" fill="none" stroke="none"/>
      <path d="M437,240 H780 V307 Q780,310 777,310 H440 Q437,310 437,307 Z" fill="#da8230" fill-opacity="0.05"/>
      <path d="M437,240 H780 V307 Q780,310 777,310 H440 Q437,310 437,307 Z" fill="none" stroke="#da8230" stroke-width="1.2"/>
      <rect x="437" y="240" width="343" height="5" fill="#da8230" opacity="0.7"/>
    </g>
    <text x="35" y="260" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" class="accent-1" letter-spacing="1.5">PREDICTED</text>
    <text x="35" y="275" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="fg-1">Audio clipping spike</text>
    <text x="35" y="290" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="fg-1">at impact (~124 dB SPL)</text>
    <text x="35" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="8.5" class="fg-3">Recorder must saturate at peak</text>
    <text x="452" y="260" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" class="accent-2" letter-spacing="1.5">DOCUMENTED</text>
    <text x="452" y="275" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="fg-1">No clipping spike</text>
    <text x="452" y="290" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="fg-1">in audio recording</text>
    <text x="452" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="8.5" class="fg-3">Clean waveform across the event</text>
    <text x="400" y="285" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" class="accent-2" text-anchor="middle">✗</text>
    <text x="400" y="300" font-family="Segoe UI, Arial, sans-serif" font-size="6" font-weight="600" class="accent-2" text-anchor="middle" letter-spacing="1.2">MISMATCH</text>
  </g>

  <!-- ============================================================ -->
  <!-- ROW 4 (y=325)                                                -->
  <!-- ============================================================ -->
  <g id="row-4">
    <g id="card-predicted-4">
      <rect class="card" x="20" y="325" width="343" height="70" fill="none" stroke="none"/>
      <path d="M20,325 H363 V392 Q363,395 360,395 H23 Q20,395 20,392 Z" fill="#0096d1" fill-opacity="0.05"/>
      <path d="M20,325 H363 V392 Q363,395 360,395 H23 Q20,395 20,392 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
      <rect x="20" y="325" width="343" height="5" fill="#0096d1" opacity="0.7"/>
    </g>
    <g id="card-documented-4">
      <rect class="card" x="437" y="325" width="343" height="70" fill="none" stroke="none"/>
      <path d="M437,325 H780 V392 Q780,395 777,395 H440 Q437,395 437,392 Z" fill="#da8230" fill-opacity="0.05"/>
      <path d="M437,325 H780 V392 Q780,395 777,395 H440 Q437,395 437,392 Z" fill="none" stroke="#da8230" stroke-width="1.2"/>
      <rect x="437" y="325" width="343" height="5" fill="#da8230" opacity="0.7"/>
    </g>
    <text x="35" y="345" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" class="accent-1" letter-spacing="1.5">PREDICTED</text>
    <text x="35" y="360" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="fg-1">Witness reaction</text>
    <text x="35" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="fg-1">to ~126 dB peak</text>
    <text x="35" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="8.5" class="fg-3">Jackhammer at 1 m distance</text>
    <text x="452" y="345" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" class="accent-2" letter-spacing="1.5">DOCUMENTED</text>
    <text x="452" y="360" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="fg-1">No reaction;</text>
    <text x="452" y="375" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="fg-1">witness reports no bang</text>
    <text x="452" y="390" font-family="Segoe UI, Arial, sans-serif" font-size="8.5" class="fg-3">No acoustic event noted in account</text>
    <text x="400" y="370" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" class="accent-2" text-anchor="middle">✗</text>
    <text x="400" y="385" font-family="Segoe UI, Arial, sans-serif" font-size="6" font-weight="600" class="accent-2" text-anchor="middle" letter-spacing="1.2">MISMATCH</text>
  </g>

  <!-- ============================================================ -->
  <!-- ROW 5 (y=410)                                                -->
  <!-- ============================================================ -->
