      <rect class="card" x="20" y="410" width="343" height="70" fill="none" stroke="none"/>
      <path d="M20,410 H363 V477 Q363,480 360,480 H23 Q20,480 20,477 Z" fill="#0096d1" fill-opacity="0.05"/>
      <path d="M20,410 H363 V477 Q363,480 360,480 H23 Q20,480 20,477 Z" fill="none" stroke="#0096d1" stroke-width="1"/>
