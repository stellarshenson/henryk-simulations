    <text x="35" y="475" font-family="Segoe UI, Arial, sans-serif" font-size="8.5" class="fg-3">Body orientation set by throw direction</text>
    <text x="452" y="430" font-family="Segoe UI, Arial, sans-serif" font-size="8" font-weight="600" class="accent-2" letter-spacing="1.5">DOCUMENTED</text>
    <text x="452" y="445" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="fg-1">Leaning, sliding, crawling</text>
    <text x="452" y="460" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" class="fg-1">all front-first</text>
    <text x="452" y="475" font-family="Segoe UI, Arial, sans-serif" font-size="8.5" class="fg-3">Witness reports forward orientation</text>
