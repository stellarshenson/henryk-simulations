# Simulation parameters for the corridor-incident model - the user file.
#
# This file holds the SCENARIO parameters: the subject, the geometry, the
# run conditions, the mix - the values particular to this case. The
# literature/model-derived defaults live inside the library at
# src/henryk_simulations/simulation_config.yml; simconfig.py merges
# the library defaults under this file (values here win).
#
# To override a standardised default, add its key to the matching section
# below. Physics-linked quantities (total_time, yaw_inertia, m_eff, the
# 5-DOF chain) derive in code and are not listed. The merged config is
# validated on load - see corridor/validation.py.

# --- the subject -------------------------------------------------------
body:
  body_mass: 70.0             # kg, full body mass of the thrown subject
  body_height: 1.68           # m, standing height

# --- the acoustic scene ------------------------------------------------
acoustics:
  v_close: 2.74               # m/s, closing velocity at the door (notebook 01 no-coast bound)
  mic_distance: 1.0           # m, microphone distance from the impact
  sample_rate: 44100          # Hz, working audio sample rate

# --- choreography (notebook 01) ----------------------------------------
choreography:
  phase1_duration: 1.5        # s, duration of phase 1 (the pull); total_time = phase1 + phase2
  phase2_duration: 1.5        # s, duration of phase 2 (the departure)
  arc_length: 2.0             # m, phase-1 curved centre-of-mass path length
  lateral_offset: 0.25        # m, diagonal sag of the curved CoM path
  return_translation: 0.5     # m, phase-2 return translation
  rotation: 3.141592653589793 # rad, per-phase yaw turn (a half-turn)

# --- impact dynamics (notebook 02) -------------------------------------
impact:
  subject_gender: "F"         # subject sex, "F" or "M" - shifts the injury thresholds
  subject_age: 38             # subject age in years; null assumes a standard adult

# --- body-thump FEM (notebook 03) --------------------------------------
# All bodyfem parameters are standardised - they live in the library
# simulation_config.yml. To override one, add a `bodyfem:` section here
# with that key.

# --- door-clang FEM (notebook 04) --------------------------------------
doorfem:
  strike_x: 0.65              # m, strike point on the door, width axis
  strike_y: 1.3               # m, strike point, height axis (upper-back contact height)

# --- corridor reverb (notebooks 03/04) ---------------------------------
reverb:
  corridor_width: 2.0         # m, distance between the two side walls
  corridor_length: 10.0       # m, distance between the E and W end walls
  source_x: 1.0               # m, impact source across the corridor width
  source_y: 1.0               # m, impact source along the corridor length
  mic_x: 1.0                  # m, microphone across the width
  mic_y: 2.0                  # m, microphone along the length

# --- event-audio augmentation (notebook 05) ----------------------------
audiomix:
  peak_time: 15.0             # s, event-timeline instant the synthesized peaks land on
  toy_release_time: 12.5      # s, the toy is released - the event-timeline reference
  scream_time: 16.5           # s, the scream heard in the recording
  thump_gain: 5.0             # linear gain on the body thump in the mix
  clang_gain: 2.0             # linear gain on the door clang in the mix
  headroom: 0.97              # peak the mix is soft-limited toward
